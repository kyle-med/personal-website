<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCS 评分计算器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F2F2F7; /* iOS 系统背景色 */
            -webkit-tap-highlight-color: transparent;
        }

        /* iOS 风格的按钮激活效果 */
        .ios-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ios-btn:active {
            transform: scale(0.96);
            opacity: 0.7;
        }

        /* 毛玻璃效果 */
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* 隐藏默认单选框 */
        input[type="radio"] {
            display: none;
        }
    </style>
</head>
<body class="pb-10">

<div id="app" class="max-w-md mx-auto">
    <header class="glass-header sticky top-0 z-50 px-6 py-4 border-b border-gray-200 text-center">
        <h1 class="text-xl font-semibold text-gray-900">GCS 昏迷评分</h1>
    </header>

    <div class="px-4 mt-6 space-y-8">
        
        <section>
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3 px-2">睁眼反应 (Eye Opening)</h2>
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <label v-for="item in options.eye" :key="item.val" class="block">
                    <input type="radio" v-model="scores.e" :value="item.val">
                    <div :class="['px-5 py-4 flex justify-between items-center ios-btn border-b border-gray-50 last:border-0', scores.e === item.val ? 'bg-blue-50' : '']">
                        <span class="text-gray-800 font-medium">{{ item.text }}</span>
                        <span :class="['text-sm', scores.e === item.val ? 'text-blue-600 font-bold' : 'text-gray-400']">{{ item.val }}分</span>
                    </div>
                </label>
            </div>
        </section>

        <section>
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3 px-2">语言反应 (Verbal Response)</h2>
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <label v-for="item in options.verbal" :key="item.val" class="block">
                    <input type="radio" v-model="scores.v" :value="item.val">
                    <div :class="['px-5 py-4 flex justify-between items-center ios-btn border-b border-gray-50 last:border-0', scores.v === item.val ? 'bg-blue-50' : '']">
                        <span class="text-gray-800 font-medium">{{ item.text }}</span>
                        <span :class="['text-sm', scores.v === item.val ? 'text-blue-600 font-bold' : 'text-gray-400']">{{ item.val }}分</span>
                    </div>
                </label>
            </div>
        </section>

        <section>
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3 px-2">运动反应 (Motor Response)</h2>
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <label v-for="item in options.motor" :key="item.val" class="block">
                    <input type="radio" v-model="scores.m" :value="item.val">
                    <div :class="['px-5 py-4 flex justify-between items-center ios-btn border-b border-gray-50 last:border-0', scores.m === item.val ? 'bg-blue-50' : '']">
                        <span class="text-gray-800 font-medium">{{ item.text }}</span>
                        <span :class="['text-sm', scores.m === item.val ? 'text-blue-600 font-bold' : 'text-gray-400']">{{ item.val }}分</span>
                    </div>
                </label>
            </div>
        </section>

        <div :class="['mt-10 p-8 rounded-3xl text-center shadow-lg transition-all duration-500', totalScore <= 8 ? 'bg-red-500 text-white shadow-red-200' : 'bg-blue-600 text-white shadow-blue-200']">
            <div class="text-sm opacity-80 mb-1 font-medium italic">GCS Total Score</div>
            <div class="text-6xl font-bold mb-4">{{ totalScore }}</div>
            <div class="text-lg font-semibold">
                E{{ scores.e }} V{{ scores.v }} M{{ scores.m }}
            </div>
            
            <div v-if="totalScore <= 8" class="mt-4 py-2 px-4 bg-white/20 rounded-full inline-block animate-pulse">
                ⚠️ 提示：需气管插管
            </div>
        </div>

    </div>
</div>

<script>
    const { createApp, reactive, computed } = Vue;

    createApp({
        setup() {
            const scores = reactive({
                e: 4,
                v: 5,
                m: 6
            });

            const options = {
                eye: [
                    { text: '自动睁眼', val: 4 },
                    { text: '呼唤睁眼', val: 3 },
                    { text: '刺痛睁眼', val: 2 },
                    { text: '无反应', val: 1 }
                ],
                verbal: [
                    { text: '回答准确', val: 5 },
                    { text: '回答错误', val: 4 },
                    { text: '胡言乱语', val: 3 },
                    { text: '仅能发音', val: 2 },
                    { text: '无反应', val: 1 }
                ],
                motor: [
                    { text: '按指令动作', val: 6 },
                    { text: '对刺痛能定位', val: 5 },
                    { text: '刺痛时肢体回避', val: 4 },
                    { text: '刺痛时肢体屈曲', val: 3 },
                    { text: '刺痛时肢体伸直', val: 2 },
                    { text: '无反应', val: 1 }
                ]
            };

            const totalScore = computed(() => scores.e + scores.v + scores.m);

            return {
                scores,
                options,
                totalScore
            };
        }
    }).mount('#app');
</script>

</body>
</html>
